name: ai-task-platform

services:
  backend:
    build: ./backend
    container_name: backend

    ports:
      - "5000:5000"

    env_file:
      - ./backend/.env

    depends_on:
      - redis

    restart: unless-stopped

  worker:
    build: ./worker
    container_name: worker

    env_file:
      - ./worker/.env

    depends_on:
      - redis

    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: frontend

    ports:
      - "5173:5173"

    depends_on:
      - backend

    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis

    ports:
      - "6379:6379"

    restart: unless-stopped